<!DOCTYPE html>
<html xmlns:th="http://www.w3.org/1999/xhtml">
<meta charset="utf-8">
<head th:include="include :: header_lu"></head>

<body class="gray-bg">
<div class="ui container">
    <div class="ui bottom attached segment">
        <form id="signupForm" action="" class="ui basic form">
            <input type="hidden" id="isReadonly" th:value="${readonly}" />
            <input id="id" name="id" th:value="${reviewResult.id}" type="hidden"/>
            <input id="proId" name="proId" th:value="${qcProData.proId}" type="hidden"/>
            <input id="taskId" name="taskId" th:value="${qcProData.taskId}" type="hidden" />

            <div class="ui bottom attached segment">
                <h4 class="ui red horizontal divider header">基本信息</h4>

                <div class="ui three fields">
                    <div class="ui field">
                        <label>完成单位</label>
                        <input type="text" th:value="${groupInfo != null ? groupInfo.groupDesc : ''}" readonly />
                    </div>
                    <div class="ui field">
                        <label>课题名称</label>
                        <input type="text" th:value="${groupInfo != null ? groupInfo.topicName : ''}" readonly />
                    </div>
                    <div class="ui field">
                        <label>申报账号</label>
                        <input type="text" th:value="${groupInfo != null ? groupInfo.applyId : ''}" readonly />
                    </div>
                </div>

                <div class="ui three fields">
                    <div class="ui field">
                        <label>课题类型</label>
                        <input type="text" th:value="${groupInfo != null ? groupInfo.topicType : ''}" readonly />
                    </div>
                    <div class="ui field">
                        <label>小组名称</label>
                        <input type="text" th:value="${groupInfo != null ? groupInfo.groupName : ''}" readonly />
                    </div>
                    <div class="ui field">
                        <label>申报单位</label>
                        <input type="text" th:value="${groupInfo != null ? groupInfo.unitName : ''}" readonly />
                    </div>
                </div>

                <div class="ui three fields">
                    <div class="ui field">
                        <label>分类</label>
                        <input type="text" th:value="${groupInfo != null ? groupInfo.professionalScope : ''}" readonly />
                    </div>
                </div>
            </div>

            <div class="ui bottom attached segment" style="margin-top: 16px;">
                <h4 class="ui red horizontal divider header">附件上传页签</h4>
                <table class="ui celled table">
                    <thead>
                    <tr>
                        <th style="width:60px;">序号</th>
                        <th>材料名称</th>
                        <th>已上传文件</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr><td>1</td><td>成果材料（可编辑）</td><td><div th:each="doc : ${docUploadDoList}" th:if="${doc.fileType} == 'result_source'"><a th:href="${doc.url}" target="_blank" th:text="${doc.fileName}"></a></div></td></tr>
                    <tr><td>2</td><td>成果材料（PDF版）</td><td><div th:each="doc : ${docUploadDoList}" th:if="${doc.fileType} == 'apply_table'"><a th:href="${doc.url}" target="_blank" th:text="${doc.fileName}"></a></div></td></tr>
                    <tr><td>3</td><td>小组申报表（PDF版）</td><td><div th:each="doc : ${docUploadDoList}" th:if="${doc.fileType} == 'report_paper'"><a th:href="${doc.url}" target="_blank" th:text="${doc.fileName}"></a></div></td></tr>
                    <tr><td>4</td><td>小组申报表（可编辑版）</td><td><div th:each="doc : ${docUploadDoList}" th:if="${doc.fileType} == 'report_paper2'"><a th:href="${doc.url}" target="_blank" th:text="${doc.fileName}"></a></div></td></tr>
                    <tr><td>5</td><td>小组报告单（PDF版）</td><td><div th:each="doc : ${docUploadDoList}" th:if="${doc.fileType} == 'act_recommend'"><a th:href="${doc.url}" target="_blank" th:text="${doc.fileName}"></a></div></td></tr>
                    <tr><td>6</td><td>现场评价表（PDF版）</td><td><div th:each="doc : ${docUploadDoList}" th:if="${doc.fileType} == 'result_recommend'"><a th:href="${doc.url}" target="_blank" th:text="${doc.fileName}"></a></div></td></tr>
                    <tr><td>7</td><td>成果评价表（PDF版）</td><td><div th:each="doc : ${docUploadDoList}" th:if="${doc.fileType} == 'result_real_recommend'"><a th:href="${doc.url}" target="_blank" th:text="${doc.fileName}"></a></div></td></tr>
                    <tr><td>8</td><td>实际价值评价表（PDF版）</td><td><div th:each="doc : ${docUploadDoList}" th:if="${doc.fileType} == 'group_member'"><a th:href="${doc.url}" target="_blank" th:text="${doc.fileName}"></a></div></td></tr>
                    <tr><td>9</td><td>概况统计表（PDF版）</td><td><div th:each="doc : ${docUploadDoList}" th:if="${doc.fileType} == 'survey_statistic'"><a th:href="${doc.url}" target="_blank" th:text="${doc.fileName}"></a></div></td></tr>
                    <tr><td>10</td><td>评价组长资格证书</td><td><div th:each="doc : ${docUploadDoList}" th:if="${doc.fileType} == 'certificate'"><a th:href="${doc.url}" target="_blank" th:text="${doc.fileName}"></a></div></td></tr>
                    </tbody>
                </table>
            </div>

            <div class="ui bottom attached segment" style="margin-top: 16px;">
                <h4 class="ui red horizontal divider header">小组成员</h4>
                <table class="ui celled table">
                    <thead>
                    <tr>
                        <th>姓名</th>
                        <th>身份证号</th>
                        <th>分工</th>
                        <th>职称</th>
                        <th>联系方式</th>
                        <th>通讯地址</th>
                        <th>证书</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="m : ${memberList}">
                        <td th:text="${m.membername}"></td>
                        <td th:text="${m.idCardNumber}"></td>
                        <td th:text="${m.responsibilities}"></td>
                        <td th:text="${m.professionalTitle}"></td>
                        <td th:text="${m.mailingAddress}"></td>
                        <td th:text="${m.locate}"></td>
                        <td>
                            <a th:if="${m.certificateNumber != null and m.certificateNumber != ''}"
                               th:href="${m.certificateNumber}" target="_blank">查看证书</a>
                            <span th:if="${m.certificateNumber == null or m.certificateNumber == ''}">-</span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="ui form" style="margin-top: 12px;">
                <div class="field">
                    <label>结果评价</label>
                    <input type="text" id="opinionDesc" name="opinionDesc"
                           th:value="${reviewResult.opinionDesc}" placeholder="请输入结果评价">
                </div>
            </div>
            <h4 class="ui red horizontal divider header">审查结论</h4>
            <div class="inline fields">
                <label>审查结论</label>
                <div class="field">
                    <div class="ui radio checkbox">
                        <input type="radio" name="reviewResult" th:checked="${reviewResult.reviewResult} == '参评'" value="参评" />
                        <label>参评</label>
                    </div>
                </div>
                <div class="field">
                    <div class="ui radio checkbox">
                        <input type="radio" name="reviewResult" th:checked="${reviewResult.reviewResult} == '完善后参评'" value="完善后参评" />
                        <label>完善后参评</label>
                    </div>
                </div>
                <div class="field">
                    <div class="ui radio checkbox">
                        <input type="radio" name="reviewResult" th:checked="${reviewResult.reviewResult} == '不评'" value="不评" />
                        <label>不评</label>
                    </div>
                </div>
                <div class="field">
                    <div class="ui radio checkbox">
                        <input type="radio" name="reviewResult" th:checked="${reviewResult.reviewResult} == '缓评'" value="缓评" />
                        <label>缓评</label>
                    </div>
                </div>
            </div>

            <div class="ui error message"></div>
            <div class="ui basic center aligned segment">
                <button type="submit" class="ui submit button">提交</button>
            </div>
        </form>
    </div>
</div>

<div th:include="include :: footer_lu"></div>
<script type="text/javascript" src="/js/appjs/cpe/qcReviewResultRecord/add.js?v=1.3"></script>
<script>
    $('.ui.radio.checkbox').checkbox();
    // $('.ui.form').form({});
</script>
</body>
</html>
